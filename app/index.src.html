<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1A2B4A" />
<title>Trippin — V1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- pdf.js carregado sob demanda -->
<style>
  :root{
    --ink:#14213D; --deep:#1A2B4A; --coral:#FF6B5C; --coral-d:#E85746;
    --lagoon:#2DB5A3; --sand:#F7F5F0; --amber:#F4A259; --danger:#D9534F;
    --line:#E4E0D6; --muted:#6B7A90; --card:#FFFFFF; --shadow:0 6px 24px rgba(20,33,61,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#E9E5DC;color:var(--ink);
    display:flex;justify-content:center;min-height:100vh}
  #root{width:100%;max-width:430px;background:var(--sand);min-height:100vh;
    box-shadow:0 0 60px rgba(0,0,0,.12);position:relative;overflow:hidden}
  h1,h2,h3,h4,.display{font-family:'Sora',sans-serif;margin:0}
  .mono{font-family:'JetBrains Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:15px}
  .screen{padding:0 0 90px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  @keyframes slideL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
  @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}

  /* App bar */
  .appbar{position:sticky;top:0;z-index:30;background:var(--deep);color:#fff;
    display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .appbar .ttl{font-family:'Sora';font-weight:700;font-size:17px;flex:1;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;color:#fff;background:rgba(255,255,255,.08);font-size:18px;position:relative}
  .iconbtn:active{background:rgba(255,255,255,.18)}
  .badge{position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;
    font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Inter'}

  .pad{padding:20px 18px}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--coral);
    font-weight:700;margin-bottom:6px}
  .muted{color:var(--muted)}
  .sub{color:var(--muted);font-size:14px;line-height:1.5}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 18px;border-radius:14px;font-weight:600;font-size:15px;width:100%;
    transition:transform .08s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--coral);color:#fff;box-shadow:0 6px 16px rgba(255,107,92,.32)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn-lagoon{background:var(--lagoon);color:#fff}
  .btn-danger{background:#fff;color:var(--danger);border:1.5px solid #f0caca}
  .btn:disabled{opacity:.45;pointer-events:none}

  /* Fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .field .req{color:var(--coral)}
  .inp{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;
    background:#fff;outline:none;transition:border .15s}
  .inp:focus{border-color:var(--lagoon)}
  .inp.err{border-color:var(--danger)}
  .errmsg{color:var(--danger);font-size:12px;margin-top:5px}
  .row{display:flex;gap:10px}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .tripcard{position:relative;overflow:hidden;border-radius:20px;color:#fff;padding:18px;
    margin-bottom:14px;box-shadow:var(--shadow);min-height:120px;
    background:linear-gradient(135deg,#1A2B4A,#23406b)}
  .tripcard.past{background:linear-gradient(135deg,#4a4a52,#6b6b78)}
  .stamp{position:absolute;top:14px;right:14px;border:2px solid rgba(255,255,255,.55);
    color:rgba(255,255,255,.92);font-family:'Sora';font-weight:700;font-size:10px;
    letter-spacing:.1em;padding:4px 9px;border-radius:6px;transform:rotate(6deg);text-transform:uppercase}
  .tripcode{font-size:11px;opacity:.7;margin-top:2px;display:flex;align-items:center;gap:6px}
  .copybtn{background:rgba(255,255,255,.15);border-radius:6px;padding:2px 7px;font-size:10px;color:#fff}

  .opt{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);
    border-radius:16px;padding:16px;margin-bottom:12px;width:100%;text-align:left}
  .opt:active{background:#fafafa}
  .opt .ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;
    justify-content:center;font-size:20px;flex-shrink:0}
  .opt .tx{flex:1}
  .opt .tx b{display:block;font-size:15px}
  .opt .tx span{font-size:12.5px;color:var(--muted)}
  .opt .arr{color:var(--muted)}

  /* Tabs (trip) */
  .tabbar{position:sticky;top:66px;z-index:20;background:var(--sand);display:flex;
    gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--line)}
  .tabbar::-webkit-scrollbar{display:none}
  .tab{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;color:var(--muted);
    white-space:nowrap;background:#fff;border:1px solid var(--line)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .segbtns{display:flex;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .segbtns button{padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .segbtns button.on{background:var(--ink);color:#fff}
  .navarrow{width:34px;height:34px;border-radius:10px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink)}
  .daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .dcell{aspect-ratio:1;border-radius:10px;background:#fff;border:1px solid var(--line);
    padding:4px;font-size:11px;position:relative;overflow:hidden}
  .dcell .dn{font-weight:700;font-size:11px}
  .dcell.dim{opacity:.35}
  .dcell .dot{width:6px;height:6px;border-radius:50%;background:var(--lagoon);position:absolute;bottom:5px;left:5px}
  .dcell .stay{position:absolute;bottom:4px;right:4px;font-size:9px}
  .tslot{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .tslot .tm{font-size:12px;color:var(--muted);width:48px;flex-shrink:0;font-weight:600}
  .actblk{background:#fff;border:1px solid var(--line);border-left:4px solid var(--lagoon);
    border-radius:10px;padding:10px 12px;flex:1;margin-bottom:6px;position:relative}
  .blkbtns{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  .blkbtn{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:13px;background:#f1ede4;color:var(--ink)}
  .blkbtn.del{background:#ffece9;color:var(--danger)}
  .blkbtn:active{opacity:.7}
  .typetag{display:inline-block;font-size:10px;font-weight:700;color:var(--lagoon);background:#e7f7f4;
    padding:2px 7px;border-radius:6px;margin-bottom:4px}
  .actblk .adesc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4}
  /* location marker (small block at top of day / on week & month) */
  .locmark{display:flex;align-items:center;gap:7px;color:#fff;font-weight:700;font-size:12.5px;
    padding:7px 12px;border-radius:10px;margin-bottom:12px;box-shadow:0 3px 10px rgba(20,33,61,.12)}
  .locchip{display:inline-flex;align-items:center;gap:4px;color:#fff;font-weight:700;font-size:10px;
    padding:2px 8px;border-radius:20px}
  /* week view: vertical day cards with time column */
  .wkday{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .wkday .wkh{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
    background:#faf8f3;border-bottom:1px solid var(--line)}
  .wkday .wkh .wd{font-family:'Sora';font-weight:700;font-size:14px}
  .wkday .wkh .wdsub{font-size:11px;color:var(--muted)}
  .wkday.today .wkh{background:#eef5ff}
  .wkrow{display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid #f0ece3}
  .wkrow:last-child{border-bottom:none}
  .wkrow .wt{font-size:11px;color:var(--muted);font-weight:600;width:42px;flex-shrink:0;padding-top:2px}
  .wkrow .wblk{flex:1;font-size:13px;border-left:3px solid var(--lagoon);padding-left:8px;line-height:1.3}
  .wkrow .wblk .wbt{font-size:11px;color:var(--muted)}
  .wkempty{padding:12px;font-size:12.5px;color:var(--muted);text-align:center}
  /* itinerário interpretado (cards de etapa) */
  .stageWrap{position:relative;padding-left:26px;margin-bottom:12px}
  .stageWrap:before{content:'';position:absolute;left:9px;top:6px;bottom:-12px;width:2px;background:var(--line)}
  .stageWrap:last-child:before{display:none}
  .dotmark{position:absolute;left:3px;top:6px;width:14px;height:14px;border-radius:50%;border:3px solid var(--sand);box-shadow:0 0 0 2px var(--line)}
  .stagebox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:var(--shadow)}
  .stagebox .sbadge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:6px;color:#fff;margin-bottom:6px}
  .stagebox .scity{font-family:'Sora';font-weight:700;font-size:16px}
  .stagebox .siata{font-family:'JetBrains Mono';font-weight:700;font-size:12px;color:var(--muted);margin-left:5px}
  .stagebox .sair{font-size:11.5px;color:var(--muted);margin-top:1px}
  .stagebox .stimes{display:flex;gap:16px;margin-top:9px;flex-wrap:wrap}
  .stagebox .slab{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .stagebox .sval{font-family:'JetBrains Mono';font-weight:700;font-size:15px}
  .stagebox .sdt{font-size:10px;color:var(--muted)}
  .stagebox .slay{display:flex;align-items:center;gap:6px;background:#fffaf3;border:1px solid var(--amber);border-radius:9px;padding:6px 10px;margin-top:9px;font-size:12px;font-weight:600;color:#9a5b13}
  .sfly{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#eef5ff;color:#2c5dc7;margin:8px 6px 0 0}
  .actblk.conflict{border-left-color:var(--amber);background:#fffaf3}
  .actblk b{font-size:14px}
  .actblk .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .joinbtn{margin-top:8px;font-size:12px;font-weight:600;color:var(--lagoon);
    border:1px solid var(--lagoon);border-radius:8px;padding:5px 10px;background:#fff}
  .joinbtn.joined{background:var(--lagoon);color:#fff}

  .alert{background:#fffaf3;border:1px solid var(--amber);border-radius:14px;padding:14px;
    margin-bottom:14px;display:flex;gap:12px}
  .alert .ai{font-size:20px}
  .alert b{font-size:14px;display:block;margin-bottom:3px}
  .alert p{margin:0;font-size:13px;color:var(--muted)}

  /* Docs */
  .subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .subtab{padding:8px 13px;border-radius:11px;font-size:13px;font-weight:600;background:#fff;
    border:1px solid var(--line);color:var(--muted)}
  .subtab.on{background:var(--lagoon);color:#fff;border-color:var(--lagoon)}
  .docitem{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:13px;margin-bottom:10px}
  .docitem .di{font-size:22px}
  .docitem .dt{flex:1}
  .docitem .dt b{font-size:14px;display:block}
  .docitem .dt span{font-size:12px;color:var(--muted)}
  .offline{font-size:10px;font-weight:700;color:var(--lagoon);background:#e7f7f4;
    padding:3px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}

  /* members */
  .member{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:12px;margin-bottom:10px}
  .ava{width:42px;height:42px;border-radius:50%;background:var(--lagoon);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
  .ava.adm{background:var(--coral)}
  .admtag{font-size:10px;font-weight:700;color:var(--coral);background:#ffecea;padding:2px 7px;border-radius:6px}

  /* gallery */
  .gal{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .gal .ph{aspect-ratio:1;border-radius:10px;background:linear-gradient(135deg,#cfe6e2,#a9d4cd);
    display:flex;align-items:center;justify-content:center;font-size:22px;color:#2c6e64}

  /* suggestions */
  .sug{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:13px;
    padding:13px;margin-bottom:10px}
  .sug .si{width:46px;height:46px;border-radius:11px;background:#f1ede4;display:flex;
    align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .sug .st{flex:1}
  .sug .st b{font-size:14px;display:block}
  .sug .st .rt{font-size:12px;color:var(--amber);font-weight:600}
  .sug .st span{font-size:12px;color:var(--muted)}

  /* expenses */
  .expense{display:flex;align-items:center;justify-content:space-between;background:#fff;
    border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}
  .expense .el b{font-size:14px;display:block}
  .expense .el span{font-size:12px;color:var(--muted)}
  .expense .ev{font-family:'JetBrains Mono';font-weight:600;color:var(--ink)}

  /* chips */
  .chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
    border-radius:20px;padding:6px 12px;font-size:13px;margin:0 6px 6px 0}
  .chip .x{color:var(--danger);font-weight:700}
  .dest{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:12px;margin-bottom:10px}
  .dest .pin{font-size:18px}
  .dest .dd{flex:1}
  .dest .dd b{font-size:14px;display:block}
  .dest .dd span{font-size:12px;color:var(--muted)}

  /* search dropdown */
  .searchwrap{position:relative}
  .results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);
    border-radius:12px;margin-top:4px;box-shadow:var(--shadow);z-index:10;overflow:hidden}
  .results button{display:block;width:100%;text-align:left;padding:12px 14px;font-size:14px;
    border-bottom:1px solid var(--line)}
  .results button:active{background:#f6f6f6}

  /* sticky footer actions (new trip) */
  .footactions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;
    max-width:430px;display:flex;gap:10px;padding:14px 16px;background:linear-gradient(transparent,var(--sand) 30%)}

  /* drawer + notif overlay */
  .overlay{position:fixed;inset:0;max-width:430px;left:50%;transform:translateX(-50%);
    background:rgba(20,33,61,.45);z-index:50;animation:fade .2s}
  .drawer{position:absolute;top:0;left:0;bottom:0;width:78%;max-width:320px;background:var(--sand);
    box-shadow:8px 0 30px rgba(0,0,0,.2);animation:slideL .25s ease;display:flex;flex-direction:column}
  .notifpanel{position:absolute;top:0;right:0;left:auto;bottom:0;width:86%;max-width:340px;background:var(--sand);
    box-shadow:-8px 0 30px rgba(0,0,0,.2);animation:slideR .25s ease;display:flex;flex-direction:column}
  .drawer .dh{background:var(--deep);color:#fff;padding:22px 18px}
  .drawer .dh .ava{width:54px;height:54px;font-size:20px;margin-bottom:10px}
  .navitem{display:flex;align-items:center;gap:13px;padding:15px 18px;font-size:15px;font-weight:500;color:var(--ink)}
  .navitem:active{background:#efeae0}
  .navitem .ni{width:24px;text-align:center;font-size:17px}

  .notifitem{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}
  .notifitem.unread{border-left:4px solid var(--coral)}
  .notifitem p{margin:0 0 8px;font-size:13.5px;line-height:1.45}
  .notifitem .nt{font-size:11px;color:var(--muted)}

  /* modal */
  .modal{position:fixed;inset:0;max-width:430px;left:50%;transform:translateX(-50%);
    background:rgba(20,33,61,.5);z-index:60;display:flex;align-items:center;justify-content:center;
    padding:24px;animation:fade .2s}
  .modalbox{background:#fff;border-radius:20px;padding:24px;width:100%;animation:pop .2s ease;text-align:center}
  .modalbox .mi{font-size:34px;margin-bottom:8px}
  .modalbox h3{font-size:18px;margin-bottom:8px}
  .modalbox p{font-size:14px;color:var(--muted);margin:0 0 20px;line-height:1.5}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);
    color:#fff;padding:13px 20px;border-radius:30px;font-size:14px;font-weight:500;z-index:70;
    box-shadow:0 10px 30px rgba(0,0,0,.3);animation:pop .2s;display:flex;align-items:center;gap:8px}

  /* lang grid */
  .langgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .langbtn{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px;
    text-align:left;display:flex;align-items:center;gap:10px}
  .langbtn.on{border-color:var(--coral);background:#fff5f3}
  .langbtn .fl{font-size:24px}
  .langbtn .ln{font-size:13.5px;font-weight:600}
  .langbtn .lc{font-size:11px;color:var(--muted)}

  .hero{background:linear-gradient(160deg,#1A2B4A,#2c4a72);color:#fff;padding:32px 22px 26px;
    border-radius:0 0 26px 26px}
  .hero .logo{font-family:'Sora';font-weight:800;font-size:30px;letter-spacing:-.02em}
  .hero .logo .dot{color:var(--coral)}
  .hero p{margin:6px 0 0;opacity:.8;font-size:14px}

  .photoadd{width:84px;height:84px;border-radius:50%;border:2px dashed var(--line);
    display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted);
    margin:0 auto 18px;background:#fff}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty .ei{font-size:40px;margin-bottom:10px}
  .sectiontitle{font-family:'Sora';font-weight:700;font-size:16px;margin:18px 0 12px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#e7f7f4;color:var(--lagoon)}

  /* ===== Barra inferior de navegação ===== */
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
  .bottombar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
    background:var(--deep);display:flex;align-items:center;justify-content:space-around;
    padding:8px 30px 11px;z-index:46;box-shadow:0 -4px 20px rgba(0,0,0,.18)}
  .bnav{display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,.72);
    font-size:10px;font-weight:600;position:relative;background:none;border:none;cursor:pointer}
  .bnav:active{color:#fff}
  .bnav .bic{font-size:20px;line-height:1}
  .bnav .badge{top:-5px;right:8px}
  .bnav.center{background:var(--coral);color:#fff;width:54px;height:54px;border-radius:50%;justify-content:center;
    margin-top:-22px;box-shadow:0 6px 16px rgba(255,107,92,.4);border:4px solid var(--sand)}
  .bnav.center .bic{font-size:23px}

  /* ===== Menu full-screen (de baixo para cima) ===== */
  .menusheet{position:absolute;inset:0;background:var(--sand);z-index:60;display:flex;flex-direction:column;
    animation:slideUp .28s ease}
  .menusheet .mh{background:var(--deep);color:#fff;padding:20px 18px;display:flex;align-items:center;gap:14px}
  .menusheet .mh .ava{width:50px;height:50px;font-size:19px}
  .menusheet .closex{margin-left:auto;width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.12);
    color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
  .menusheet .mlist{flex:1;overflow-y:auto;padding:8px 0}

  /* ===== Configurações ===== */
  .setrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:11px}
  .setrow .si{width:40px;height:40px;border-radius:11px;background:#eef2f7;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .setrow .st{flex:1}
  .setrow .st b{display:block;font-size:14px}
  .setrow .st span{font-size:12px;color:var(--muted)}
  .switch{width:46px;height:27px;border-radius:20px;background:#d4cfc4;position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
  .switch.on{background:var(--lagoon)}
  .switch:after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch.on:after{left:22px}
  .segpick{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .segpick button{flex:1;padding:9px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none}
  .segpick button.on{background:var(--ink);color:#fff}

  /* ===== Apps de viagem ===== */
  .appcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px;margin-bottom:11px}
  .appcard .ai{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
  .appcard .at{flex:1}
  .appcard .at b{display:block;font-size:14px}
  .appcard .at span{font-size:12px;color:var(--muted)}
  .appcard .soon{font-size:10px;font-weight:700;color:var(--muted);background:#eee9df;padding:3px 8px;border-radius:6px}

  /* ===== Galeria com imagens reais ===== */
  .galimg{aspect-ratio:1;border-radius:10px;background-size:cover;background-position:center;background-color:#cfe6e2}
  .galadd{aspect-ratio:1;border-radius:10px;background:var(--card);border:1.5px dashed var(--line);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}

  /* ===== "x" para excluir viagem (admin) ===== */
  .cardx{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:9px;background:rgba(0,0,0,.28);
    color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2;border:none}
  .cardx:active{background:rgba(0,0,0,.5)}

  /* ===== Tema escuro ===== */
  #root[data-theme="dark"]{--sand:#151d2c;--ink:#E6ECF5;--card:#1c2740;--line:#2c3a55;--muted:#9aabc4;--deep:#0f1726}
  #root[data-theme="dark"]{background:#151d2c}
  #root[data-theme="dark"] .card,#root[data-theme="dark"] .inp,#root[data-theme="dark"] .opt,
  #root[data-theme="dark"] .tab,#root[data-theme="dark"] .subtab,#root[data-theme="dark"] .docitem,
  #root[data-theme="dark"] .member,#root[data-theme="dark"] .dest,#root[data-theme="dark"] .wkday,
  #root[data-theme="dark"] .stagebox,#root[data-theme="dark"] .dcell,#root[data-theme="dark"] .expense,
  #root[data-theme="dark"] .sug,#root[data-theme="dark"] .modalbox,#root[data-theme="dark"] .navarrow,
  #root[data-theme="dark"] .segbtns,#root[data-theme="dark"] .wkday .wkh,#root[data-theme="dark"] .langbtn,
  #root[data-theme="dark"] .notifitem,#root[data-theme="dark"] .setrow .si,#root[data-theme="dark"] .appcard .ai{
    background:var(--card);color:var(--ink);border-color:var(--line)}
  #root[data-theme="dark"] select.inp option{background:#1c2740}
  #root[data-theme="dark"] .btn-ghost{background:var(--card);color:var(--ink)}
</style>

/* ---------------- small UI helpers ---------------- */
function Toast({msg}){return msg?<div className="toast">✓ {msg}</div>:null;}

function ConfirmModal({icon,title,msg,confirmLabel,cancelLabel,onConfirm,onCancel,danger}){
  return(<div className="modal" onClick={onCancel}>
    <div className="modalbox" onClick={e=>e.stopPropagation()}>
      <div className="mi">{icon}</div><h3>{title}</h3><p>{msg}</p>
      <button className={"btn "+(danger?"btn-primary":"btn-primary")} style={danger?{background:'var(--danger)',boxShadow:'none'}:{}} onClick={onConfirm}>{confirmLabel}</button>
      {cancelLabel&&<button className="btn btn-ghost" style={{marginTop:10}} onClick={onCancel}>{cancelLabel}</button>}

}

function LanguageScreen({onPick}){
  const [sel,setSel]=useState('pt-BR');
  const t=dict(sel);
  return(<div className="screen">
    <div className="hero"><div className="logo">Trippin<span className="dot">.</span></div>
      <p>{dict('pt-BR').welcome}</p></div>
    <div className="pad">
      <div className="eyebrow">Idioma · Language</div>
      <h2 style={{fontSize:22,marginBottom:6}}>{t.chooseLang}</h2>
      <p className="sub" style={{marginBottom:18}}>{t.langSub}</p>
      <div className="langgrid">
        {LANGS.map(l=>(
          <button key={l.code} className={"langbtn"+(sel===l.code?' on':'')} onClick={()=>setSel(l.code)}>
            <span className="fl">{l.fl}</span>
            <span><span className="ln">{l.name}</span><br/><span className="lc">{l.sub}</span></span>
          </button>))}
      </div>
      <button className="btn btn-primary" style={{marginTop:20}} onClick={()=>onPick(sel)}>{t.continue} →</button>
    </div>
  </div>);
}

function PhotoPicker({photo,onPick,hint}){
  const ref=useRef(null);
  const handle=e=>{const file=e.target.files&&e.target.files[0]; if(!file)return;
    const r=new FileReader(); r.onload=()=>onPick(r.result); r.readAsDataURL(file);};
  return(<div style={{textAlign:'center',marginBottom:18}}>
    <button type="button" className="photoadd" style={photo?{backgroundImage:'url('+photo+')',backgroundSize:'cover',backgroundPosition:'center',border:'2px solid var(--lagoon)'}:{}}
      onClick={()=>ref.current&&ref.current.click()}>{photo?'':'📷'}</button>
    <div className="sub" style={{fontSize:12,marginTop:-10}}>{hint}</div>
    {/* accept image/* deixa o dispositivo oferecer Câmera, Galeria ou Arquivos (PNG, JPEG...) */}
    <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={handle}/>
  </div>);
}

function ProfileScreen({lang,onDone}){
  const t=dict(lang);
  const [f,setF]=useState({firstName:'',lastName:'',birth:'',cpf:'',email:'',country:'🇧🇷 +55',phone:'',photo:''});
  const [touched,setTouched]=useState(false);
  const set=(k,v)=>setF({...f,[k]:v});
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email);
  const valid=f.firstName&&f.lastName&&f.birth&&emailOk&&f.phone;
  const submit=()=>{ setTouched(true); if(!valid)return;
    onDone({...f, code:rnum(6), createdAt:new Date().toISOString()}); };
  return(<div className="screen">
    <div className="appbar"><div className="ttl">{t.createProfile}</div></div>
    <div className="pad">
      <p className="sub" style={{marginBottom:18}}>{t.profileSub}</p>
      <PhotoPicker photo={f.photo} onPick={v=>set('photo',v)} hint={t.changePhoto}/>
      <div className="field"><label>{t.firstName} <span className="req">*</span></label>
        <input className={"inp"+(touched&&!f.firstName?' err':'')} value={f.firstName} onChange={e=>set('firstName',e.target.value)}/></div>
      <div className="field"><label>{t.lastName} <span className="req">*</span></label>
        <input className={"inp"+(touched&&!f.lastName?' err':'')} value={f.lastName} onChange={e=>set('lastName',e.target.value)}/></div>
      <div className="field"><label>{t.birth} <span className="req">*</span></label>
        <input type="date" className={"inp"+(touched&&!f.birth?' err':'')} value={f.birth} onChange={e=>set('birth',e.target.value)}/></div>
      <div className="field"><label>{t.cpf}</label>
        <input className="inp" placeholder="000.000.000-00" value={f.cpf} onChange={e=>set('cpf',e.target.value)}/></div>
      <div className="field"><label>{t.email} <span className="req">*</span></label>
        <input className={"inp"+(touched&&!emailOk?' err':'')} placeholder="voce@email.com" value={f.email} onChange={e=>set('email',e.target.value)}/>
        {touched&&!emailOk&&<div className="errmsg">{t.invalidEmail}</div>}</div>
      <div className="field"><label>{t.phone} <span className="req">*</span></label>
        <div className="row">
          <select className="inp" style={{maxWidth:120}} value={f.country} onChange={e=>set('country',e.target.value)}>
            {COUNTRIES.map(c=><option key={c}>{c}</option>)}</select>
          <input className={"inp"+(touched&&!f.phone?' err':'')} placeholder="11 99999-9999" value={f.phone} onChange={e=>set('phone',e.target.value)}/>
        </div></div>
      <button className="btn btn-primary" style={{marginTop:8}} onClick={submit}>{t.confirm}</button>
    </div>
  </div>);
}

  const set=(k,v)=>setF({...f,[k]:v});
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email);
  const valid=f.firstName&&f.lastName&&f.birth&&emailOk&&f.phone;
  const submit=()=>{ setTouched(true); if(!valid)return; onSave(f); };

/* ---- localização por dia (destinos da viagem + chegadas das passagens anexadas) ---- */
const CITY_PALETTE=['#2DB5A3','#FF6B5C','#5B8DEF','#9B7BE0','#F4A259','#3FA796','#E0729B'];
function cityColor(city){ if(!city)return '#6B7A90'; let h=0; for(let i=0;i<city.length;i++)h=(h*31+city.charCodeAt(i))%CITY_PALETTE.length; return CITY_PALETTE[h]; }
const cityOf=name=> (name||'').split(',')[0].trim();
const addMin=(hhmm,min)=>{const p=(hhmm||'00:00').split(':').map(Number);let m=p[0]*60+p[1]+min;m=Math.max(0,Math.min(m,1439));
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');};
// âncoras ordenadas por data: destinos definidos na criação + chegadas lidas das passagens
function locationAnchors(trip){
  const a=[];
  (trip.destinations||[]).forEach(d=>{ if(d.date&&d.name&&d.name!=='A definir') a.push({date:d.date,city:cityOf(d.name)}); });
  (trip.docs||[]).forEach(doc=>{
    if(doc.itin&&doc.itin.legs){ doc.itin.legs.forEach(lg=>{ if(lg.arrDate&&lg.to&&lg.to.city) a.push({date:lg.arrDate,city:lg.to.city,doc:true}); }); }
    else { const p=doc.seg; if(p&&p.arrDate&&p.toCity) a.push({date:p.arrDate,city:p.toCity,doc:true}); }
  });
  return a.sort((x,y)=> x.date===y.date ? ((x.doc?1:0)-(y.doc?1:0)) : x.date.localeCompare(y.date));
}
// vale do dia da chegada/destino até o fim OU até o próximo destino
function locationForDay(trip,day){ const a=locationAnchors(trip).filter(x=>x.date<=day); return a.length?a[a.length-1].city:null; }
// todos os locais por onde o usuário passa (destinos + origem/escalas/destino das passagens), em ordem
function tripLocations(trip){
  const items=[];
  (trip.destinations||[]).forEach(d=>{ const c=cityOf(d.name); if(c&&c!=='A definir') items.push({date:d.date||trip.startDate,city:c}); });
  (trip.docs||[]).forEach(doc=>{
    if(doc.itin&&doc.itin.legs){ doc.itin.legs.forEach(lg=>{ items.push({date:lg.depDate,city:lg.from.city}); items.push({date:lg.arrDate,city:lg.to.city}); }); }
    else if(doc.seg){ items.push({date:doc.seg.depDate,city:doc.seg.fromCity}); items.push({date:doc.seg.arrDate,city:doc.seg.toCity}); }
  });
  items.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const out=[]; items.forEach(i=>{ if(i.city&&!out.includes(i.city)) out.push(i.city); });
  return out;
}
// 7 dias (segunda→domingo) da semana que contém o dia
function weekDaysOf(dayStr){ const d=new Date(dayStr+'T00:00:00'); const dow=(d.getDay()+6)%7; const mon=new Date(d); mon.setDate(d.getDate()-dow);
  const out=[]; for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);out.push(x.toISOString().slice(0,10));} return out; }
const DOW=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

/* ===== Interpretador de roteiro de passagem aérea (parser testado) ===== */
// pdf.js sob demanda (ver pdfToText)
const AIRPORTS=[
  [/GUARULHOS|GRU\b/i,{iata:'GRU',city:'São Paulo'}],[/CONGONHAS/i,{iata:'CGH',city:'São Paulo'}],
  [/GALEAO|GALEÃO|RIO DE JANEIRO/i,{iata:'GIG',city:'Rio de Janeiro'}],
  [/LISBON|LISBOA/i,{iata:'LIS',city:'Lisboa'}],[/PORTO/i,{iata:'OPO',city:'Porto'}],
  [/LUXEMBOURG/i,{iata:'LUX',city:'Luxemburgo'}],[/MADRID/i,{iata:'MAD',city:'Madri'}],
  [/BARCELONA/i,{iata:'BCN',city:'Barcelona'}],[/PARIS|CHARLES DE GAULLE/i,{iata:'CDG',city:'Paris'}],
  [/LONDON|HEATHROW/i,{iata:'LHR',city:'Londres'}],[/FRANKFURT/i,{iata:'FRA',city:'Frankfurt'}],
  [/ROME|ROMA|FIUMICINO/i,{iata:'FCO',city:'Roma'}],[/AMSTERDAM|SCHIPHOL/i,{iata:'AMS',city:'Amsterdã'}],
];
const MONTHS_T={jan:0,feb:1,fev:1,mar:2,apr:3,abr:3,may:4,mai:4,jun:5,jul:6,aug:7,ago:7,sep:8,set:8,oct:9,out:9,nov:10,dec:11,dez:11};
const titleCase=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()).replace(/\s+/g,' ').trim();
function resolveAirport(rawName){let name=(rawName||'').replace(/(INTL|AIRPORT|INTERNATIONAL|TERMINAL)/gi,' $1').replace(/\s+/g,' ').trim();
  for(const [re,info] of AIRPORTS){ if(re.test(name)) return {...info,airport:titleCase(name)}; }
  const m=name.match(/\b([A-Z]{3})\b/);
  return {iata:m?m[1]:'—',city:titleCase((name.split(/\s{2,}|,/)[0]||name)),airport:titleCase(name)};}
function parseDateT(s){const m=s.match(/(\d{1,2})([A-Za-z]{3})(\d{4})/);if(!m)return null;
  const mo=MONTHS_T[m[2].toLowerCase()];if(mo==null)return null;return new Date(Date.UTC(+m[3],mo,+m[1]));}
const fmtDateT=d=>d?d.toISOString().slice(0,10):null;
function diffHM(d1,t1,d2,t2){const a=new Date(d1+'T'+t1+':00Z'),b=new Date(d2+'T'+t2+':00Z');
  let min=Math.round((b-a)/60000);if(min<0)min=0;return {min,label:Math.floor(min/60)+'h'+String(min%60).padStart(2,'0')};}
function parseAirTicket(text){
  const linesAll=text.split(/\r?\n/); let s=0,e=linesAll.length;
  linesAll.forEach((l,i)=>{ if(/\bFlight\b/.test(l)&&/\bDeparture\b/.test(l))s=i+1;
    if(/^\s*\(1\)\s*OK|OBSERVA(Ç|C)/i.test(l)&&e===linesAll.length&&i>s)e=i;});
  const lines=linesAll.slice(s,e);
  const legRe=/\b([A-Z]{2}\d{2,4})\b[^\d]*(\d{1,2}:\d{2})\s+(\d{1,2}:\d{2})/; const legs=[];
  for(let i=0;i<lines.length;i++){ const m=lines[i].match(legRe); if(!m)continue;
    const flight=m[1],depT=m[2],arrT=m[3];
    const pre=lines[i].slice(0,lines[i].indexOf(flight)).trim();
    const cols=pre.split(/\s{2,}/).filter(Boolean); let from=cols[0]||'',to=cols[1]||'';
    if(!to){for(let k=i-1;k>=0&&k>i-4;k--){if(lines[k].trim()){to=from;from=lines[k].trim();break;}}}
    let depDate=null,arrDate=null;
    for(let k=i;k<Math.min(i+3,lines.length);k++){ const dts=lines[k].match(/\d{1,2}[A-Za-z]{3}\d{4}/g);
      if(dts&&dts.length>=2){depDate=parseDateT(dts[0]);arrDate=parseDateT(dts[1]);break;}
      if(dts&&dts.length===1){if(!depDate)depDate=parseDateT(dts[0]);else{arrDate=parseDateT(dts[0]);break;}}}
    let dur=null;
    for(let k=i;k<lines.length;k++){ if(k>i&&legRe.test(lines[k]))break;
      const d=lines[k].match(/Dura(?:ç|c)(?:ão|ao)?\s*\/?\s*Duration:\s*(\d{1,2}:\d{2})|Duration:\s*(\d{1,2}:\d{2})/i);
      if(d){dur=d[1]||d[2];break;}}
    legs.push({flight,from:resolveAirport(from),to:resolveAirport(to),depTime:depT,arrTime:arrT,
      depDate:fmtDateT(depDate),arrDate:fmtDateT(arrDate),duration:dur});}
  const stages=[];
  if(legs.length){ const f=legs[0];
    stages.push({kind:'origin',city:f.from.city,airport:f.from.airport,iata:f.from.iata,depTime:f.depTime,depDate:f.depDate,flight:f.flight,duration:f.duration});
    for(let i=0;i<legs.length-1;i++){const cur=legs[i],nxt=legs[i+1];
      const lay=(cur.arrDate&&nxt.depDate)?diffHM(cur.arrDate,cur.arrTime,nxt.depDate,nxt.depTime):null;
      stages.push({kind:'layover',city:cur.to.city,airport:cur.to.airport,iata:cur.to.iata,arrTime:cur.arrTime,arrDate:cur.arrDate,
        depTime:nxt.depTime,depDate:nxt.depDate,layover:lay?lay.label:null,inFlight:cur.flight,outFlight:nxt.flight,nextDuration:nxt.duration});}
    const l=legs[legs.length-1];
    stages.push({kind:'destination',city:l.to.city,airport:l.to.airport,iata:l.to.iata,arrTime:l.arrTime,arrDate:l.arrDate,flight:l.flight});}
  return {legs,stages};
}
const _scriptCache={};
function loadScriptOnce(src){ return _scriptCache[src] || (_scriptCache[src]=new Promise((res,rej)=>{ const el=document.createElement('script'); el.src=src; el.onload=()=>res(); el.onerror=()=>rej(new Error('falha ao carregar '+src)); document.head.appendChild(el); })); }
async function pdfToText(buf){
  if(typeof pdfjsLib==='undefined'){ await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'); }
  if(typeof pdfjsLib==='undefined') throw new Error('PDF indisponível');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf=await pdfjsLib.getDocument({data:buf}).promise; let rows=[];
  for(let p=1;p<=pdf.numPages;p++){ const page=await pdf.getPage(p); const content=await page.getTextContent();
    const byY={};
    content.items.forEach(it=>{ if(!it.str.trim())return; const y=Math.round(it.transform[5]);
      let key=Object.keys(byY).find(k=>Math.abs(k-y)<=2); if(key==null)key=y;
      (byY[key]=byY[key]||[]).push({x:it.transform[4],w:it.width||it.str.length*4,s:it.str});});
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{ const items=byY[y].sort((a,b)=>a.x-b.x);
      let line='',lastEnd=null; items.forEach(it=>{ if(lastEnd!=null){const gap=it.x-lastEnd;
        if(gap>14)line+='   '; else if(gap>1.5)line+=' ';} line+=it.s; lastEnd=it.x+it.w;});
      rows.push(line);});}
  return rows.join('\n');
}

  const hasConflict=(a)=>dayActs.some(b=>b.id!==a.id && b.start<a.end && a.start<b.end);
  const conflictExists = dayActs.some(a=>hasConflict(a));

    const dates=trip.activities.map(a=>a.date).filter(Boolean);

      {dayActs.length===0&&!adding&&<div className="empty"><div className="ei">🗓️</div>Nada planejado neste dia.</div>}

                <button className="blkbtn del" title={t.deleteActivity} onClick={()=>setDelId(a.id)}>✕</button>
              </div>
              {a.type&&<span className="typetag" style={{color:tc,background:tc+'1A'}}>{t[a.type]}</span>}
              <b style={{display:'block',paddingRight:60}}>{a.title}</b>
              <div className="meta">🕐 {a.start}–{a.end} {a.loc&&'· 📍 '+a.loc} {a.source==='doc'&&'· 🤖 auto'}</div>

/* --- Map: monta a jornada a partir dos destinos + trechos das passagens (Docs) --- */

  const segs=[];
  (trip.docs||[]).forEach(d=>{
    if(d.itin&&d.itin.legs) d.itin.legs.forEach(lg=>segs.push({fromCity:lg.from.city,toCity:lg.to.city,depDate:lg.depDate,depTime:lg.depTime,arrDate:lg.arrDate,arrTime:lg.arrTime,iata:lg.from.iata+'→'+lg.to.iata}));
    else if(d.seg) segs.push(d.seg);
  });
  segs.sort((a,b)=>((a.depDate||'')+ (a.depTime||'')).localeCompare((b.depDate||'')+(b.depTime||'')));
  // constrói lista ordenada de paradas (cidade + data) sem repetir cidade consecutiva
  const stops=[];
  const push=(city,date)=>{ if(!city)return; const last=stops[stops.length-1];
    if(!last||last.city!==city) stops.push({city,date}); };
  (trip.destinations||[]).filter(d=>d.name&&d.name!=='A definir').forEach(d=>push(cityOf(d.name),d.date));
  segs.forEach(s=>{ push(s.fromCity,s.depDate); push(s.toCity,s.arrDate); });
  const pts=stops.length?stops:[{city:'A definir',date:trip.startDate}];
  const n=pts.length;
  const xs=i=> n===1?150 : 30+(240*i/(n-1));
  const ys=i=> 55+(i%2===0?-15:15);

  return(<div>
    <div className="card" style={{background:'linear-gradient(135deg,#dceee9,#bfe0d8)',border:'none',minHeight:200,
      display:'flex',flexDirection:'column',justifyContent:'center',position:'relative',overflow:'hidden'}}>

        <polyline points={pts.map((_,i)=>xs(i)+','+ys(i)).join(' ')} fill="none" stroke="#FF6B5C" strokeWidth="2.5" strokeDasharray="2 6" strokeLinecap="round"/>
        {pts.map((p,i)=>(<g key={i}>
          <circle cx={xs(i)} cy={ys(i)} r="6" fill={i===0?'#F4A259':i===n-1?'#5B8DEF':'#1A2B4A'}/>
          <text x={xs(i)} y={ys(i)+(i%2===0?-12:20)} fontSize="9" fontWeight="700" fill="#234" textAnchor="middle">{p.city}</text>
        </g>))}
      </svg>
    </div>

    {segs.length>0&&<>
      <div className="sectiontitle">✈️ Trechos (das passagens)</div>
      {segs.map((s,i)=>(<div className="dest" key={i}>
        <span className="pin">✈️</span>
        <span className="dd"><b>{s.fromCity} → {s.toCity}</b>
          <span>{s.depDate} {s.depTime} → {s.arrDate} {s.arrTime}</span></span>
      </div>))}
    </>}

    <div className="sectiontitle">📍 Lugares por onde você vai passar</div>
    {pts.map((p,i)=>{const role=i===0?'Origem':i===n-1?'Destino':'Escala / parada';return(
      <div className="dest" key={i}>
      <span className="pin">{i===0?'🟠':i===n-1?'🔵':'⚪'}</span>
      <span className="dd"><b>{p.city}</b><span>{role}{p.date?' · '+brDateT(p.date):''}</span></span>
      <span className="locchip" style={{background:cityColor(p.city)}}>📍</span>
    </div>);})}
    <div className="card sub" style={{textAlign:'center',fontSize:12}}>🟠 Origem · ⚪ Escala · 🔵 Destino final · Anexe passagens em Docs para enriquecer a rota · Percurso em tempo real chega na v2</div>
  </div>);
}

/* --- Docs (anexo real do dispositivo + remoção; inteligência sob controle do usuário) --- */
function DocsTab({t,trip,update,toast,goTab}){
  const cats=[['tickets',t.tickets,'🎫',['Avião','Trem','Ônibus']],
    ['stays',t.stays,'🏨',['Airbnb','Hotel','Booking']],
    ['events',t.events,'🎭',['Esporte','Festa','Teatro','Culinária']],
    ['extras',t.extras,'📎',['Diversos']]];
  const [cat,setCat]=useState('tickets');
  const [sub,setSub]=useState('Avião');
  const [readId,setReadId]=useState(null);   // doc sendo "lido" (passagem)
  const [busy,setBusy]=useState(false);
  const [confirmDoc,setConfirmDoc]=useState(null); // doc aguardando confirmação p/ cronograma
  const fileRef=useRef(null);
  const cur=cats.find(c=>c[0]===cat);
  const catDocs=trip.docs.filter(d=>d.cat===cat && d.sub===sub);
  const icon=cat==='tickets'?'🎫':cat==='stays'?'🏨':cat==='events'?'🎭':'📎';
  const typeForCat={tickets:'typeTransport',stays:'typeStay',events:'typeEvent',extras:'typeOther'};

  // Anexo real do dispositivo + interpretação automática quando é passagem em PDF
  const onFile=async e=>{
    const file=e.target.files&&e.target.files[0]; if(!file)return;
    e.target.value='';
    const dataUrl = file.size<2*1024*1024 ? await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);}) : null;
    const doc={id:uid(),cat,sub,name:file.name.replace(/\.[^.]+$/,''),file:file.name,
      mime:file.type||'arquivo',size:file.size,dataUrl,offline:!!dataUrl};
    // tenta interpretar o roteiro se for passagem em PDF
    if(cat==='tickets' && /pdf/i.test(file.type||file.name)){
      setBusy(true);
      try{ const buf=await file.arrayBuffer(); const txt=await pdfToText(buf); const itin=parseAirTicket(txt);
        if(itin.stages.length) doc.itin=itin;
      }catch(err){ /* segue sem interpretação */ }
      setBusy(false);
    }
    update({...trip,docs:[...trip.docs,doc]});
    toast(t.docAttached);
    if(cat==='tickets') setReadId(doc.id);
  };
  const removeDoc=(id)=>{ update({...trip,docs:trip.docs.filter(d=>d.id!==id),
    activities:trip.activities.filter(a=>a.docId!==id)}); toast(t.docRemoved); };
  const toSchedule=(d)=>{
    const act={id:uid(),docId:d.id,date:trip.startDate,start:'15:00',end:'16:00',title:d.name,
      type:typeForCat[d.cat]||'typeOther',loc:'',desc:'Criado a partir do documento: '+d.file,source:'doc',joined:['me']};
    update({...trip,activities:[...trip.activities,act]});
    toast(t.recAdded);
  };
  // ROTEIRO INTERPRETADO -> cria um card de PARTIDA e um de CHEGADA por trecho, em CADA data correta
  const buildStageBlocks=(d)=>{
    const legs=d.itin.legs; const blocks=[];
    legs.forEach((lg,i)=>{
      const isLay = i>0; // chegada deste trecho num aeroporto de escala
      blocks.push({id:uid(),docId:d.id,date:lg.depDate,start:lg.depTime,end:addMin(lg.depTime,40),
        title:'✈️ '+t.departure+' — '+lg.from.city+' ('+lg.from.iata+')', type:'typeTransport', loc:lg.from.airport,
        desc:t.departure+' '+lg.from.airport+' · '+t.flight+' '+lg.flight+' → '+lg.to.city+(lg.duration?(' · '+lg.duration.replace(':','h')):''),
        source:'doc', joined:['me']});
      const isFinal = i===legs.length-1;
      blocks.push({id:uid(),docId:d.id,date:lg.arrDate,start:lg.arrTime,end:addMin(lg.arrTime,30),
        title:(isFinal?'🛬 ':'🛬 ')+t.arrival+' — '+lg.to.city+' ('+lg.to.iata+')', type:'typeTransport', loc:lg.to.airport,
        desc:t.arrival+' '+lg.to.airport+' · '+t.flight+' '+lg.flight+(isFinal?'':' · '+t.lblLayover), source:'doc', joined:['me']});
    });
    const first=legs[0], last=legs[legs.length-1];
    const seg={fromCity:first.from.city,toCity:last.to.city,depDate:first.depDate,depTime:first.depTime,arrDate:last.arrDate,arrTime:last.arrTime};
    const dates=[...new Set(blocks.map(b=>b.date))].sort();
    return {blocks,seg,dates};
  };
  const applyStages=(d)=>{
    const {blocks,seg}=buildStageBlocks(d);
    update({...trip, docs:trip.docs.map(x=>x.id===d.id?{...x,seg}:x),
      activities:[...trip.activities.filter(a=>a.docId!==d.id), ...blocks]});
    setConfirmDoc(null); setReadId(null); toast(t.stagesAdded);
    if(goTab) goTab('schedule'); // encaminha o usuário ao cronograma
  };
  // LEITURA MANUAL: bloco de PARTIDA e de CHEGADA + trecho (seg)
  const saveTicket=(d,seg)=>{
    const dep={id:uid(),docId:d.id,date:seg.depDate,start:seg.depTime,end:addMin(seg.depTime,40),
      title:'✈️ '+t.departure+' — '+seg.fromCity, type:'typeTransport', loc:seg.fromCity,
      desc:seg.fromCity+' → '+seg.toCity+' · '+d.file, source:'doc', joined:['me']};
    const arr={id:uid(),docId:d.id,date:seg.arrDate,start:seg.arrTime,end:addMin(seg.arrTime,30),
      title:'🛬 '+t.arrival+' — '+seg.toCity, type:'typeTransport', loc:seg.toCity,
      desc:t.youAreIn+' '+seg.toCity+' · '+d.file, source:'doc', joined:['me']};
    update({...trip, docs:trip.docs.map(x=>x.id===d.id?{...x,seg,itin:undefined}:x),
      activities:[...trip.activities.filter(a=>a.docId!==d.id), dep, arr]});
    setReadId(null); toast(t.ticketRead);
  };
  const human=b=> b? (b<1024?b+' B':b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB') : '';
  const readingDoc = readId?trip.docs.find(d=>d.id===readId):null;
  const lbl={origin:t.lblOrigin,layover:t.lblLayover,destination:t.lblDestination,dep:t.departure,arr:t.arrival,nextDep:t.nextDep,layoverTime:t.layoverLabel};

  return(<div>
    <div className="subtabs">
      {cats.map(c=><button key={c[0]} className={"subtab"+(cat===c[0]?' on':'')} onClick={()=>{setCat(c[0]);setSub(c[3][0]);}}>{c[2]} {c[1]}</button>)}
    </div>
    <div className="subtabs">
      {cur[3].map(s=><button key={s} className={"subtab"+(sub===s?' on':'')} style={sub===s?{}:{opacity:.7}} onClick={()=>setSub(s)}>{s}</button>)}
      <button className="subtab">+</button>
    </div>

    {cat==='tickets'&&<div className="alert" style={{background:'#eef5ff',borderColor:'#b9d4ff'}}>
      <span className="ai">🤖</span><div><b>Interpretador de passagem</b>
        <p>Anexe o PDF da passagem: o roteiro é lido automaticamente (origem, escalas e destino com horários) e vira etapas no cronograma. PDF não reconhecido? Você preenche manualmente.</p></div></div>}

    {/* input real de arquivos do dispositivo: aceita qualquer tipo (PDF, PNG, JPEG, ...) */}
    <input ref={fileRef} type="file" accept="*/*" style={{display:'none'}} onChange={onFile}/>
    <button className="btn btn-dark" style={{marginBottom:14}} disabled={busy} onClick={()=>fileRef.current&&fileRef.current.click()}>
      {busy?'⏳ '+t.interpreting:'📎 '+t.attachDoc}</button>

    {readingDoc&&(readingDoc.itin
      ? <div className="card" style={{borderColor:'#b9d4ff'}}>
          <b style={{fontFamily:'Sora',fontSize:14}}>🤖 {t.interpretedRoute}</b>
          <div className="sub" style={{fontSize:11,margin:'2px 0 12px'}}>{readingDoc.file}</div>
          {readingDoc.itin.stages.map((st,i)=><ItinStageCard key={i} st={st} lbl={lbl}/>)}
          <button className="btn btn-primary" style={{marginTop:6}} onClick={()=>setConfirmDoc(readingDoc)}>📅 {t.addStages}</button>
          <button className="btn btn-ghost" style={{marginTop:8}} onClick={()=>update({...trip,docs:trip.docs.map(x=>x.id===readingDoc.id?{...x,itin:undefined}:x)})}>✏️ {t.editManual}</button>
        </div>
      : <TicketReadForm t={t} trip={trip} doc={readingDoc}
          onSave={seg=>saveTicket(readingDoc,seg)} onCancel={()=>setReadId(null)}/>)}

    {catDocs.length===0
      ? <div className="empty"><div className="ei">📄</div>{t.noDocs}</div>
      : catDocs.map(d=>(<div className="docitem" key={d.id}>
          <span className="di">{icon}</span>
          <span className="dt">
            <b>{d.name}</b>
            <span>{d.file}{d.size?' · '+human(d.size):''}</span>
            {d.itin
              ? <div className="sub" style={{fontSize:12,marginTop:3}}>🧭 {d.itin.stages[0].city} → {d.itin.stages[d.itin.stages.length-1].city} · {d.itin.legs.length} voo(s) · {d.itin.stages.filter(x=>x.kind==='layover').length} escala(s)</div>
              : d.seg&&<div className="sub" style={{fontSize:12,marginTop:3}}>✈️ {d.seg.fromCity} → {d.seg.toCity} · {brDateT(d.seg.depDate)} {d.seg.depTime} → {brDateT(d.seg.arrDate)} {d.seg.arrTime}</div>}
            <div style={{marginTop:6,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
              {d.offline&&<span className="offline">⬇ {t.offlineAvail}</span>}
              {d.dataUrl&&<a className="joinbtn" href={d.dataUrl} download={d.file} style={{textDecoration:'none'}}>⬇ Download</a>}
              {d.cat==='tickets'&&<button className="joinbtn" onClick={()=>setReadId(d.id)}>🤖 {(d.itin||d.seg)?'Ver roteiro':'Ler passagem'}</button>}
              {d.cat==='stays'&&<button className="joinbtn" onClick={()=>toSchedule(d)}>📅 {t.addToSched}</button>}
            </div>
          </span>
          <button className="blkbtn del" onClick={()=>removeDoc(d.id)}>✕</button>
        </div>))}

    {confirmDoc&&confirmDoc.itin&&(()=>{ const {dates,blocks}=buildStageBlocks(confirmDoc);
      const fmt=ds=>{const p=ds.split('-');return p[2]+'/'+p[1];};
      return <ConfirmModal icon="📅" title={t.addStages+'?'}
        msg={blocks.length+' '+(blocks.length===1?'card':'cards')+' · '+t.cardsWillAdd+' '+dates.map(fmt).join(', ')+'.'}
        confirmLabel={'📅 '+t.addStages} cancelLabel={t.cancel}
        onConfirm={()=>applyStages(confirmDoc)} onCancel={()=>setConfirmDoc(null)}/>;
    })()}
  </div>);
}

function TicketReadForm({t,trip,doc,onSave,onCancel}){
  const destGuess=(trip.destinations&&trip.destinations[0])?cityOf(trip.destinations[0].name):'';
  const [s,setS]=useState(doc.seg||{fromCity:'',toCity:destGuess,depDate:trip.startDate,depTime:'10:00',arrDate:trip.startDate,arrTime:'13:30'});
  const set=(k,v)=>setS({...s,[k]:v});
  const ok=s.fromCity&&s.toCity&&s.depDate&&s.arrDate;
  return(<div className="card" style={{borderColor:'#b9d4ff'}}>
    <b style={{fontFamily:'Sora',fontSize:14}}>🤖 {t.readTicket}</b>
    <div className="sub" style={{fontSize:11,margin:'2px 0 12px'}}>{doc.file}</div>
    <div className="field"><label>🛫 {t.origin}</label>
      <input className="inp" placeholder="São Paulo (GRU)" value={s.fromCity} onChange={e=>set('fromCity',e.target.value)}/></div>
    <div className="row">
      <div className="field" style={{flex:1.2}}><label>{t.departDT}</label>
        <input type="date" className="inp" value={s.depDate} onChange={e=>set('depDate',e.target.value)}/></div>
      <div className="field" style={{flex:1}}><label>&nbsp;</label>
        <input type="time" className="inp" value={s.depTime} onChange={e=>set('depTime',e.target.value)}/></div>
    </div>
    <div className="field"><label>🛬 {t.destination}</label>
      <input className="inp" placeholder="Lisboa (LIS)" value={s.toCity} onChange={e=>set('toCity',e.target.value)}/></div>
    <div className="row">
      <div className="field" style={{flex:1.2}}><label>{t.arriveDT}</label>
        <input type="date" className="inp" value={s.arrDate} onChange={e=>set('arrDate',e.target.value)}/></div>
      <div className="field" style={{flex:1}}><label>&nbsp;</label>
        <input type="time" className="inp" value={s.arrTime} onChange={e=>set('arrTime',e.target.value)}/></div>
    </div>
    <div className="row">
      <button className="btn btn-ghost" onClick={onCancel}>{t.cancel}</button>
      <button className="btn btn-primary" disabled={!ok} onClick={()=>onSave({...s,fromCity:s.fromCity.trim(),toCity:s.toCity.trim()})}>📅 {t.createBlocks}</button>
    </div>
  </div>);
}

/* --- Gallery --- */
function GalleryTab({t,trip,update,toast}){
  // seções por local da viagem (inclui origem/escalas/destino do interpretador)
  const cities=tripLocations(trip);
  const list=cities.length?cities:['Viagem'];
  const pickRef=useRef(null);
  const pickCity=useRef(null);
  const openPicker=(city)=>{ pickCity.current=city; pickRef.current&&pickRef.current.click(); };
  const onPick=e=>{
    const files=Array.from(e.target.files||[]); if(!files.length)return;
    const city=pickCity.current;
    Promise.all(files.map(f=>new Promise(res=>{ const r=new FileReader(); r.onload=()=>res({city,src:r.result}); r.readAsDataURL(f); })))
      .then(imgs=>{ update({...trip,gallery:[...trip.gallery,...imgs]}); toast(t.addPhotoGal+' ✓'); });
    e.target.value='';
  };
  return(<div>
    <p className="sub" style={{marginBottom:14}}>🖼️ {t.galByLocation}</p>
    {/* abre a galeria/arquivos do dispositivo; aceita várias imagens */}
    <input ref={pickRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={onPick}/>
    {list.map(city=>{const ph=trip.gallery.filter(g=>g.city===city);
      return(<div key={city}>
        <div className="sectiontitle">📍 {city} <span className="pill">{ph.length}</span></div>
        <div className="gal">
          {ph.map((g,i)=> g.src
            ? <div className="galimg" key={i} style={{backgroundImage:'url('+g.src+')'}}/>
            : <div className="ph" key={i}>🏞️</div>)}
          <button className="galadd" onClick={()=>openPicker(city)}>＋</button>
        </div>
      </div>);})}
  </div>);
}

/* --- Members --- */
function MembersTab({t,trip,update,toast}){
  const [email,setEmail]=useState('');
  const [exp,setExp]=useState(false);
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const invite=()=>{ if(!emailOk)return; setEmail(''); toast(t.inviteSent); };
  const remove=id=>update({...trip,members:trip.members.filter(m=>m.id!==id)});
  const addExpense=(d,a)=>{update({...trip,expenses:[...trip.expenses,{id:uid(),desc:d,amount:a,paidBy:'Você'}]});toast(t.expAdded);};
  return(<div>
    {trip.members.map(m=>(<div className="member" key={m.id}>
      <div className={"ava"+(m.isAdmin?' adm':'')}>{m.name[0]}</div>
      <div style={{flex:1}}><b style={{fontSize:14}}>{m.name}</b>
        <div style={{fontSize:12,color:'var(--muted)'}}>{m.email}</div></div>
      {m.isAdmin&&<span className="admtag">{t.admin}</span>}
      {!m.isAdmin&&<button className="copybtn" style={{background:'#ffece9',color:'var(--danger)'}} onClick={()=>remove(m.id)}>{t.remove}</button>}
    </div>))}

    <div className="card">
      <b style={{fontFamily:'Sora',fontSize:14}}>➕ {t.addMember}</b>
      <div className="field" style={{marginTop:10}}><label>{t.inviteEmail}</label>
        <input className={"inp"+(email&&!emailOk?' err':'')} placeholder="amigo@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        {email&&!emailOk&&<div className="errmsg">{t.invalidEmail}</div>}</div>
      <button className="btn btn-lagoon" disabled={!emailOk} onClick={invite}>📧 {t.sendInvite}</button>
    </div>

    <div className="sectiontitle">💰 {t.expenses}</div>
    {trip.expenses.map(e=>(<div className="expense" key={e.id}>
      <div className="el"><b>{e.desc}</b><span>{t.paidBy}: {e.paidBy}</span></div>
      <div className="ev">€ {e.amount}</div>
    </div>))}
    {exp ? <ExpenseForm t={t} onSave={(d,a)=>{addExpense(d,a);setExp(false);}} onCancel={()=>setExp(false)}/>
      : <button className="btn btn-ghost" onClick={()=>setExp(true)}>+ {t.addExpense}</button>}
  </div>);
}
function ExpenseForm({t,onSave,onCancel}){
  const [d,setD]=useState('');const [a,setA]=useState('');
  return(<div className="card">
    <div className="field"><label>{t.desc}</label><input className="inp" value={d} onChange={e=>setD(e.target.value)}/></div>
    <div className="field"><label>{t.amount} (€)</label><input type="number" className="inp" value={a} onChange={e=>setA(e.target.value)}/></div>
    <button className="btn btn-primary" disabled={!d||!a} onClick={()=>onSave(d,Number(a))}>{t.save}</button>
  </div>);
}

/* ---------------- Menu (full-screen, de baixo para cima) ---------------- */
function MenuSheet({t,user,onClose,onNav,onLogout}){
  const item=(ic,label,go,danger)=>(
    <button className="navitem" style={danger?{color:'var(--danger)'}:{}} onClick={()=>go()}>
      <span className="ni">{ic}</span>{label}</button>);
  return(<div className="menusheet">
    <div className="mh">
      <div className="ava" style={user.photo?{backgroundImage:'url('+user.photo+')',backgroundSize:'cover',backgroundPosition:'center'}:{}}>{user.photo?'':(user.firstName?user.firstName[0]:'U')}</div>
      <div><div style={{fontFamily:'Sora',fontWeight:700,fontSize:17}}>{user.firstName} {user.lastName}</div>
        <div style={{fontSize:12,opacity:.8}}>{t.yourCode}: <span className="mono">{user.code}</span></div></div>
      <button className="closex" onClick={onClose}>✕</button>
    </div>
    <div className="mlist">
      {item('🏠',t.home,()=>onNav('home'))}
      {item('✈️',t.newTrip,()=>onNav('new'))}
      {item('🔑',t.joinTrip,()=>onNav('join'))}
      {item('👤',t.profile,()=>onNav('profile'))}
      {item('🧩',t.apps,()=>onNav('apps'))}
      {item('⚙️',t.settings,()=>onNav('settings'))}
      <div style={{height:1,background:'var(--line)',margin:'10px 18px'}}/>
      {item('↩',t.logout,onLogout,true)}
    </div>
  </div>);
}

function BottomBar({t,onMenu,onHome,onNotif,notifCount}){
  return(<div className="bottombar">
    <button className="bnav" onClick={onMenu}><span className="bic">☰</span>{t.menu}</button>
    <button className="bnav center" onClick={onHome}><span className="bic">🏠</span></button>
    <button className="bnav" onClick={onNotif}><span className="bic">🔔</span>{t.notifications}
      {notifCount>0&&<span className="badge">{notifCount}</span>}</button>

}

/* ---------------- Configurações ---------------- */

    <div className="appbar"><button className="iconbtn" onClick={onBack}>←</button>
      <div className="ttl">{t.settings}</div><div style={{width:38}}/></div>
    <div className="pad">
      <p className="sub" style={{marginBottom:18}}>{t.settingsSub}</p>
      <div className="setrow">
        <span className="si">🔔</span>

        <div className={"switch"+(settings.notifications?' on':'')} onClick={()=>set('notifications',!settings.notifications)}/>

        <span className="st"><b>{t.shareLoc}</b><span>{t.shareLocSub}</span></span>

function NotifPanel({t,notifs,onClose,onAct}){

        {notifs.length===0&&<div className="empty"><div className="ei">🔔</div>{t.noNotif}</div>}

/* ---------------- ROOT APP ---------------- */
function App(){
  const persisted=load();
  const [lang,setLang]=useState(persisted.lang||null);
  const [user,setUser]=useState(persisted.user||null);
  const [trips,setTrips]=useState(persisted.trips||null);
  const [screen,setScreen]=useState(persisted.user?'home':'lang');
  const [activeTrip,setActiveTrip]=useState(null);
  const [toastMsg,setToastMsg]=useState('');
  const [menuOpen,setMenuOpen]=useState(false);
  const [notifOpen,setNotifOpen]=useState(false);
  const [delTrip,setDelTrip]=useState(null);
  const [settings,setSettings]=useState(persisted.settings||{notifications:true,theme:'light',shareLocation:false});
  const [notifs,setNotifs]=useState(persisted.notifs||[
    {id:'n1',text:'Marina alterou a despesa "Hotel Lisboa" para € 420. Justificativa: ajuste 3 noites.',time:'há 2h',read:false,action:'Revisar'},
    {id:'n2',text:'João Pedro ingressou na viagem Eurotrip 2026.',time:'ontem',read:false,action:'Ver'},
  ]);

  // persist
  useEffect(()=>{ if(lang||user||trips) save({lang,user,trips,notifs,settings}); },[lang,user,trips,notifs,settings]);
  // seed trips on first profile creation
  useEffect(()=>{ if(user&&trips===null){ setTrips([seedTrip()]); } },[user]);
  // aplica o tema (claro/escuro)
  useEffect(()=>{ const r=document.getElementById('root'); if(r) r.setAttribute('data-theme', settings.theme==='dark'?'dark':'light'); },[settings.theme]);

  const t=dict(lang||'pt-BR');
  const toast=m=>{setToastMsg(m);setTimeout(()=>setToastMsg(''),2200);};
  // a preferência de notificações controla o que é exibido
  const effNotifs = settings.notifications? notifs : [];
  const notifCount=effNotifs.filter(n=>!n.read).length;

  const updateTrip=(nt)=>setTrips(trips.map(x=>x.id===nt.id?nt:x));
  const openTrip=id=>{setActiveTrip(id);setScreen('trip');};
  const curTrip=trips&&trips.find(x=>x.id===activeTrip);

  const goHome=()=>{setScreen('home');setMenuOpen(false);};
  const logout=()=>{ localStorage.removeItem(KEY); setLang(null);setUser(null);setTrips(null);setScreen('lang');setMenuOpen(false); };
  const doDeleteTrip=()=>{ setTrips(trips.filter(x=>x.id!==delTrip.id)); if(activeTrip===delTrip.id)setScreen('home'); setDelTrip(null); toast(t.tripDeleted); };
  const navFromMenu=s=>{ setMenuOpen(false);
    if(s==='home')goHome(); else setScreen(s==='profile'?'profile-edit':s); };

  const showBottom = user && trips && ['home','trip','settings','apps'].includes(screen);

  return(<>
    {screen==='lang'&&<LanguageScreen onPick={l=>{setLang(l);setScreen('profile');}}/>}
    {screen==='profile'&&<ProfileScreen lang={lang} onDone={u=>{setUser(u);setScreen('home');toast(t.profileCreated);}}/>}
    {screen==='home'&&user&&trips&&<>
      <div className="appbar"><div style={{width:38}}/><div className="ttl">Trippin</div><div style={{width:38}}/></div>
      <HomeScreen lang={lang} user={user} trips={trips} onNew={()=>setScreen('new')} onJoin={()=>setScreen('join')} onOpen={openTrip} onDelete={tr=>setDelTrip(tr)}/>
    </>}
    {screen==='new'&&<NewTripScreen lang={lang} toast={toast}
      onCancel={goHome}
      onCreate={nt=>{ setTrips([...(trips||[]),nt]); toast(t.tripCreated);
        setTimeout(()=>{setActiveTrip(nt.id);setScreen('trip');},700); }}/>}
    {screen==='join'&&<JoinScreen lang={lang} onBack={goHome} toast={toast}/>}
    {screen==='profile-edit'&&user&&<ProfileEditScreen lang={lang} user={user}
      onSave={u=>{setUser(u);setScreen('home');toast(t.profileSaved);}} onBack={goHome}/>}
    {screen==='settings'&&<SettingsScreen t={t} settings={settings} setSettings={setSettings} onBack={goHome}/>}
    {screen==='apps'&&<TravelAppsScreen t={t} onBack={goHome}/>}
    {screen==='trip'&&curTrip&&<TripScreen lang={lang} trip={curTrip} update={updateTrip} onBack={goHome} toast={toast}/>}

    {showBottom&&<BottomBar t={t} onMenu={()=>setMenuOpen(true)} onHome={goHome}
      onNotif={()=>setNotifOpen(true)} notifCount={notifCount}/>}

    {menuOpen&&<MenuSheet t={t} user={user||{}} onClose={()=>setMenuOpen(false)} onNav={navFromMenu} onLogout={logout}/>}
    {notifOpen&&<NotifPanel t={t} notifs={effNotifs} onClose={()=>setNotifOpen(false)}
      onAct={id=>{setNotifs(notifs.map(n=>n.id===id?{...n,read:true}:n));toast('✓');}}/>}

    {delTrip&&<ConfirmModal icon="🗑️" title={t.deleteTripQ} msg={'"'+delTrip.name+'" — '+t.deleteTripSub}
      confirmLabel={t.yesDelete} cancelLabel={t.cancel} danger
      onConfirm={doDeleteTrip} onCancel={()=>setDelTrip(null)}/>}

    <Toast msg={toastMsg}/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
